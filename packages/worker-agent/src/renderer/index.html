<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>Workforce Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', Meiryo, Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 24px;
    }
    .card { max-width: 432px; margin: 0 auto; }
    .langbar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
    .langbtn {
      background: #1e293b; border: 1px solid #334155; color: #cbd5e1; border-radius: 6px;
      font-size: 0.75rem; padding: 4px 10px; cursor: pointer;
    }
    .langbtn:hover { background: #334155; color: #fff; }
    h1 { font-size: 1.4rem; color: #fff; margin-bottom: 4px; }
    .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; }
    .disclosure {
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 16px; margin-bottom: 16px; font-size: 0.85rem; line-height: 1.55; color: #cbd5e1;
    }
    .disclosure strong { color: #fff; }
    .disclosure ul { margin: 10px 0 0 18px; }
    .disclosure li { margin-bottom: 4px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.8rem; }
    input {
      width: 100%; padding: 10px 12px; border: 1px solid #334155; border-radius: 6px;
      background: #0f172a; color: #e2e8f0; font-size: 0.9rem;
    }
    input:focus { outline: none; border-color: #3b82f6; }
    .consent-row { display: flex; align-items: flex-start; gap: 8px; margin: 14px 0; font-size: 0.82rem; color: #cbd5e1; }
    .consent-row input { width: auto; margin-top: 2px; }
    .btn {
      width: 100%; background: #2563eb; color: #fff; border: none; padding: 12px;
      border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: background .15s;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #334155; cursor: not-allowed; }
    .btn.secondary { background: #334155; margin-top: 8px; }
    .btn.secondary:hover { background: #475569; }
    .btn.danger { background: #b91c1c; }
    .btn.danger:hover { background: #991b1b; }
    .status { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .status-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; font-size: 0.88rem; }
    .status-item:last-child { border-bottom: none; }
    .status-label { color: #94a3b8; }
    .status-value { color: #4ade80; font-weight: 500; }
    .status-value.paused { color: #fbbf24; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; }
    .badge.on { background: #14532d; color: #4ade80; }
    .badge.off { background: #78350f; color: #fbbf24; }
    .hidden { display: none; }
    .note { font-size: 0.72rem; color: #64748b; margin-top: 12px; text-align: center; }
    .err { color: #f87171; font-size: 0.8rem; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="langbar">
      <button id="langToggle" class="langbtn"></button>
    </div>

    <!-- CONSENT VIEW -->
    <div id="consentView" class="hidden">
      <h1 data-i18n="title">Workforce Monitor</h1>
      <p class="subtitle" data-i18n="enrolled"></p>
      <div class="disclosure">
        <strong data-i18n="readFirst"></strong> <span data-i18n="whileActive"></span>
        <ul>
          <li data-i18n="bullet1"></li>
          <li data-i18n="bullet2"></li>
          <li data-i18n="bullet3"></li>
        </ul>
        <p style="margin-top:10px" data-i18n="dataSent"></p>
      </div>
      <div class="form-group">
        <label for="name" data-i18n="yourName"></label>
        <input id="name" type="text" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="email" data-i18n="workEmail"></label>
        <input id="email" type="email" autocomplete="off">
      </div>
      <label class="consent-row">
        <input id="consentCheck" type="checkbox">
        <span data-i18n="consentText"></span>
      </label>
      <button id="consentBtn" class="btn" disabled data-i18n="startBtn"></button>
      <div id="consentErr" class="err hidden"></div>
      <p class="note" id="deviceNote"></p>
    </div>

    <!-- STATUS VIEW -->
    <div id="statusView" class="hidden">
      <h1 data-i18n="title">Workforce Monitor</h1>
      <p class="subtitle"><span data-i18n="enabledOn"></span> <span id="stateBadge" class="badge on"></span></p>
      <div class="status">
        <div class="status-item"><span class="status-label" data-i18n="lblStatus"></span><span class="status-value" id="statusValue"></span></div>
        <div class="status-item"><span class="status-label" data-i18n="lblCurrently"></span><span class="status-value" id="activeValue">—</span></div>
        <div class="status-item"><span class="status-label" data-i18n="lblCaptured"></span><span class="status-value" id="capturesValue">0</span></div>
        <div class="status-item"><span class="status-label" data-i18n="lblLast"></span><span class="status-value" id="lastCapture">—</span></div>
        <div class="status-item"><span class="status-label" data-i18n="lblSession"></span><span class="status-value" id="sessionTime">—</span></div>
        <div class="status-item"><span class="status-label" data-i18n="lblBackend"></span><span class="status-value" id="backendValue">—</span></div>
      </div>
      <button id="pauseBtn" class="btn secondary"></button>
      <button id="quitBtn" class="btn danger" data-i18n="quitBtn"></button>
      <p class="note" id="deviceNote2"></p>
    </div>
  </div>

  <script>
    const api = window.electronAPI;
    const $ = (id) => document.getElementById(id);

    const T = {
      en: {
        title: 'Workforce Monitor',
        enrolled: 'This device has been enrolled in workplace monitoring.',
        readFirst: 'Please read before continuing.',
        whileActive: 'While active, this application will:',
        bullet1: 'Capture periodic screenshots of every screen',
        bullet2: 'Record active vs. idle time (no keystrokes are logged)',
        bullet3: 'Record clock-in / clock-out session times',
        dataSent: "Data is sent to your organization's administrators. You can pause monitoring or quit the app at any time from the tray icon.",
        yourName: 'Your name',
        workEmail: 'Work email (optional)',
        namePlaceholder: 'e.g. Jordan Rivera',
        emailPlaceholder: 'e.g. jordan@company.com',
        consentText: 'I understand that this device will be monitored as described above and I consent to it.',
        startBtn: 'Start Monitoring',
        starting: 'Starting…',
        enterName: 'Please enter your name.',
        startFail: 'Could not start monitoring. ',
        enabledOn: 'Monitoring is enabled on this device.',
        active: 'ACTIVE', paused: 'PAUSED',
        lblStatus: 'Status', lblCurrently: 'Currently', lblCaptured: 'Screenshots captured',
        lblLast: 'Last capture', lblSession: 'Session time', lblBackend: 'Backend',
        stActive: 'Active', stPaused: 'Paused',
        atKeyboard: 'Active at keyboard', idle: 'Idle',
        pause: 'Pause Monitoring', resume: 'Resume Monitoring', quitBtn: 'Quit Agent',
        connected: 'Connected', localOnly: 'Local only',
        confirmQuit: 'Quit the monitoring agent?',
        minutes: ' min', deviceId: 'Device ID: ',
      },
      ja: {
        title: 'Workforce Monitor',
        enrolled: 'このデバイスは職場モニタリングに登録されています。',
        readFirst: '続行する前にお読みください。',
        whileActive: '有効な間、このアプリケーションは次を行います：',
        bullet1: 'すべての画面のスクリーンショットを定期的に取得します',
        bullet2: '稼働／アイドル時間を記録します（キー入力は記録しません）',
        bullet3: '出勤／退勤（クロックイン／アウト）の時間を記録します',
        dataSent: 'データは組織の管理者に送信されます。トレイアイコンからいつでもモニタリングを一時停止、またはアプリを終了できます。',
        yourName: 'お名前',
        workEmail: '勤務先メール（任意）',
        namePlaceholder: '例：山田 太郎',
        emailPlaceholder: '例：taro@company.com',
        consentText: 'このデバイスが上記のとおりモニタリングされることを理解し、同意します。',
        startBtn: 'モニタリングを開始',
        starting: '開始中…',
        enterName: 'お名前を入力してください。',
        startFail: 'モニタリングを開始できませんでした。',
        enabledOn: 'このデバイスでモニタリングが有効です。',
        active: '稼働中', paused: '一時停止',
        lblStatus: 'ステータス', lblCurrently: '現在', lblCaptured: '取得したスクリーンショット',
        lblLast: '最終取得', lblSession: 'セッション時間', lblBackend: 'バックエンド',
        stActive: '稼働中', stPaused: '一時停止',
        atKeyboard: '操作中', idle: 'アイドル',
        pause: 'モニタリングを一時停止', resume: 'モニタリングを再開', quitBtn: 'エージェントを終了',
        connected: '接続済み', localOnly: 'ローカルのみ',
        confirmQuit: 'モニタリングエージェントを終了しますか？',
        minutes: ' 分', deviceId: 'デバイスID: ',
      },
    };

    let lang = localStorage.getItem('agentLang') || 'en';
    const tr = () => T[lang];

    function applyStaticText() {
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const k = el.getAttribute('data-i18n');
        if (tr()[k] !== undefined) el.textContent = tr()[k];
      });
      $('name').placeholder = tr().namePlaceholder;
      $('email').placeholder = tr().emailPlaceholder;
      $('langToggle').textContent = lang === 'en' ? '日本語' : 'English';
    }

    $('langToggle').addEventListener('click', () => {
      lang = lang === 'en' ? 'ja' : 'en';
      localStorage.setItem('agentLang', lang);
      applyStaticText();
      render();
    });

    function show(view) {
      $('consentView').classList.toggle('hidden', view !== 'consent');
      $('statusView').classList.toggle('hidden', view !== 'status');
    }

    async function render() {
      const state = await api.getState();
      $('deviceNote').textContent = tr().deviceId + state.deviceId;
      $('deviceNote2').textContent = tr().deviceId + state.deviceId;
      if (state.consentGiven) { show('status'); refreshStatus(state); }
      else { show('consent'); }
    }

    async function refreshStatus(state) {
      try {
        const s = await api.getStatus();
        const active = s.monitoring;
        $('statusValue').textContent = active ? tr().stActive : tr().stPaused;
        $('statusValue').className = 'status-value' + (active ? '' : ' paused');
        $('stateBadge').textContent = active ? tr().active : tr().paused;
        $('stateBadge').className = 'badge ' + (active ? 'on' : 'off');
        $('pauseBtn').textContent = active ? tr().pause : tr().resume;
        if (s.activityTracker) $('activeValue').textContent = s.activityTracker.isActive ? tr().atKeyboard : tr().idle;
        if (s.screenCapture) {
          $('capturesValue').textContent = s.screenCapture.totalCaptures ?? 0;
          $('lastCapture').textContent = s.screenCapture.lastCaptureAt ? new Date(s.screenCapture.lastCaptureAt).toLocaleTimeString() : '—';
        }
        if (s.timeLogger?.clockInAt) {
          const mins = Math.floor((Date.now() - new Date(s.timeLogger.clockInAt).getTime()) / 60000);
          $('sessionTime').textContent = mins + tr().minutes;
        }
        const st = state || await api.getState();
        $('backendValue').textContent = st.backendEnabled ? tr().connected : tr().localOnly;
      } catch (e) { console.error(e); }
    }

    $('consentCheck').addEventListener('change', (e) => { $('consentBtn').disabled = !e.target.checked; });

    $('consentBtn').addEventListener('click', async () => {
      const name = $('name').value.trim();
      if (!name) { showErr(tr().enterName); return; }
      $('consentBtn').disabled = true;
      $('consentBtn').textContent = tr().starting;
      try {
        await api.giveConsent({ name, email: $('email').value.trim() || undefined });
        await render();
      } catch (e) {
        showErr(tr().startFail + (e?.message || ''));
        $('consentBtn').disabled = false;
        $('consentBtn').textContent = tr().startBtn;
      }
    });

    function showErr(msg) { const el = $('consentErr'); el.textContent = msg; el.classList.remove('hidden'); }

    $('pauseBtn').addEventListener('click', async () => {
      const s = await api.getStatus();
      if (s.monitoring) await api.pauseMonitoring(); else await api.resumeMonitoring();
      await refreshStatus();
    });

    $('quitBtn').addEventListener('click', async () => { if (confirm(tr().confirmQuit)) await api.quit(); });

    applyStaticText();
    render();
    setInterval(() => { if (!$('statusView').classList.contains('hidden')) refreshStatus(); }, 4000);
  </script>
</body>
</html>
